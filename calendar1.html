<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TF追星日历</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:720px;margin:40px auto;padding:0 20px;line-height:1.7}a.button{display:inline-block;padding:12px 18px;border-radius:12px;background:#111;color:#fff;text-decoration:none}.hint{color:#666}</style></head><body><h1>TF追星日历</h1><p>这是时代峰峻七八月活动订阅日历。包含演唱会、音乐节、家族运动会等，并在备注里标注官宣/爆料/未确认状态。</p><p><a class="button" href="tf-calendar.ics">打开/下载日历文件</a></p><p class="hint">iPhone 订阅路径：设置 → 日历 → 账户 → 添加账户 → 其他 → 添加已订阅的日历，然后粘贴 GitHub Pages 的 tf-calendar.ics 地址。</p></body></html>
